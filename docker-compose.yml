version: '3.9'

services:
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: flight-booking-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flight_booking
    ports:
      - '5432:5432'
    volumes:
      - flight_booking_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d flight_booking']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  flight_booking_data:
    driver: local
